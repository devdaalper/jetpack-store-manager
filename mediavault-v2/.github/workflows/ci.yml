name: CI

on:
  push:
    branches: [main]
    paths:
      - "mediavault-v2/**"
  pull_request:
    branches: [main]
    paths:
      - "mediavault-v2/**"

defaults:
  run:
    working-directory: mediavault-v2

jobs:
  quality:
    name: Lint + Typecheck + Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mediavault-v2/package-lock.json

      - run: npm ci

      - name: TypeScript
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
